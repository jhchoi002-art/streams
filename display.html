<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>전자칠판</title><link rel="stylesheet" href="style.css"></head><body><div class="topbar"><div>STREAMS</div><div>현재 숫자 : <span class="current" id="cur">-</span></div><div>방코드 : <span id="roomCode">-</span></div></div><div class="wrap"><section class="card" style="text-align:center"><div id="big" style="font-size:180px;font-weight:900;color:#08285e">-</div><h2 id="status"></h2></section><section class="card"><h2>입력 현황</h2><div id="students"></div></section></div><script src="app.js"></script><script>
let room=qs('room');id('roomCode').textContent=room;async function tick(){let r=await getRoom(room);if(!r)return;id('cur').textContent=r.current||'-';id('big').textContent=r.current||'-';let ss=Object.values(r.students||{});let done=ss.filter(s=>s.done).length;id('status').textContent=`입력 완료 ${done} / ${ss.length}명`;id('students').innerHTML=ss.map(s=>`<span style="display:inline-block;margin:6px;padding:10px 14px;border-radius:10px;background:${s.done?'#dff7ea':'#fff4d6'}">${s.name}</span>`).join('')}
setInterval(tick,1000);tick();
</script></body></html>
