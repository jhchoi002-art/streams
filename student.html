<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>학생 화면</title><link rel="stylesheet" href="style.css"></head><body><div class="topbar"><div>방코드 : <span id="topRoom">-</span></div><div>현재 숫자 : <span class="current" id="cur">-</span></div><div id="nameTop"></div></div><div id="join" class="card join"><h1>학생 입장</h1><input id="roomInput" class="input" placeholder="방코드" style="margin-bottom:12px"><input id="nameInput" class="input" placeholder="이름 입력"><br><br><button id="joinBtn" class="btn primary">입장하기</button></div><div id="game" style="display:none"><div class="board-shell"><div id="boardWrap"></div></div><div class="student-footer"><div id="msg">다음 숫자를 기다리는 중입니다.</div><div class="scoreline" id="scoreLine">오름차순 0칸 / 0점</div><button class="btn green" id="done">입력 완료</button></div></div><script src="app.js"></script><script>
let room=qs('room'),sid=uid(),name='',state=null,student={board:Array(20).fill(null),done:false,name:''},boardUI=null;
id('roomInput').value=room;async function join(){room=id('roomInput').value.trim().toUpperCase();name=id('nameInput').value.trim();if(!room||!name){alert('방코드와 이름을 입력하세요.');return}let r=await getRoom(room);if(!r){alert('방을 찾을 수 없습니다. 교사용 화면에서 새 방을 만든 뒤 QR로 입장하세요.');return}student=r.students&&r.students[sid]||{name,board:Array(20).fill(null),done:false};student.name=name;await putStudent(room,sid,student);localStorage.streamsStudentRoom=room;localStorage.streamsStudentName=name;showGame();}
function showGame(){id('join').style.display='none';id('game').style.display='block';id('topRoom').textContent=room;id('nameTop').textContent=name;boardUI=createBoard(id('boardWrap'));boardUI.setName(name);boardUI.onCell(clickCell);tick();setInterval(tick,1000)}
async function tick(){let r=await getRoom(room);if(!r){id('msg').textContent='방 정보를 불러오는 중입니다.';return}state=r;let s=r.students&&r.students[sid];if(s)student=s;id('cur').textContent=r.current||'-';boardUI.setName(student.name);boardUI.setValues(student.board||[]);let vals=(student.board||[]).map(x=>x&&x.value);let sc=calc(vals);boardUI.setScore(sc.score);id('scoreLine').textContent=`오름차순 ${sc.best}칸 / ${sc.score}점`;id('msg').textContent=r.current?'현재 숫자를 놓을 칸을 선택하세요. 다음 숫자가 나오기 전까지 위치를 바꿀 수 있습니다.':'다음 숫자를 기다리는 중입니다.';}
async function clickCell(i){if(!state||!state.current){id('msg').textContent='아직 숫자가 나오지 않았습니다.';return}if(state.status==='finished'){id('msg').textContent='게임이 종료되었습니다.';return}let board=student.board||Array(20).fill(null);let turn=state.turn;let card=state.current;let existing=board.findIndex(x=>x&&x.turn===turn);if(existing>=0)board[existing]=null;if(board[i]&&board[i].turn!==turn){id('msg').textContent='이미 잠긴 칸입니다.';return}board[i]={value:card,turn};student.board=board;student.done=true;boardUI.setValues(board);let sc=calc(board.map(x=>x&&x.value));id('scoreLine').textContent=`오름차순 ${sc.best}칸 / ${sc.score}점`;await patchStudent(room,sid,{name:student.name,board,done:true,updatedAt:Date.now()});}
id('joinBtn').onclick=join;id('done').onclick=async()=>{student.done=true;await patchStudent(room,sid,{done:true});id('msg').textContent='입력 완료! 다음 숫자를 기다리세요.'};
if(room&&localStorage.streamsStudentName){id('nameInput').value=localStorage.streamsStudentName}
</script></body></html>
