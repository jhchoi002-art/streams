<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>교사용 - STREAMS 3.3.3.3.2</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/board.css">
</head>
<body>
  <header class="topbar">
    <div>교사용 화면</div>
    <div>현재 숫자 : <span id="topCurrent" class="yellow">-</span></div>
    <div>방코드 : <span id="topRoom">-</span></div>
  </header>

  <main class="dashboard">
    <section class="panel room-panel">
      <h2>방코드 <button id="newRoomBtn" class="btn small">🔄 새 방</button></h2>
      <div id="roomCode" class="room-code">-</div>
      <div class="room-link" id="joinLink">학생 입장 링크 준비 중</div>
      <img id="qr" class="qr" alt="학생 입장 QR">
    </section>

    <section class="panel controls-panel">
      <button id="drawBtn" class="btn primary">다음 숫자 뽑기</button>
      <button id="resetBtn" class="btn secondary">초기화</button>
      <button id="endBtn" class="btn danger">종료/채점</button>
      <a id="displayLink" class="btn secondary" target="_blank">전자칠판 열기</a>

      <div class="progress-box">
        <h2>이번 턴 입력: <span id="turnCount">0 / 0명</span></h2>
        <div class="progress"><div id="turnFill"></div></div>
        <div id="turnMsg" class="complete-msg">🎉 모든 학생 입력 완료!</div>
      </div>
    </section>

    <section class="panel">
      <h2>학생 목록</h2>
      <div id="studentList" class="student-list">아직 학생 없음</div>
    </section>

    <section class="panel">
      <h2>순위</h2>
      <div id="rankList" class="rank-list">아직 학생 없음</div>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <button id="closeModal" class="modal-close">×</button>
      <h2 id="modalTitle">학생 판</h2>
      <div id="modalBoard" class="modal-board"></div>
    </div>
  </div>

  <script src="js/firebase.js"></script>
  <script src="js/common.js"></script>
  <script src="js/board.js"></script>
  <script src="js/teacher.js"></script>
</body>
</html>
