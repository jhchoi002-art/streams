<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>교사용 화면</title><link rel="stylesheet" href="style.css"></head><body><div class="topbar"><div>교사용 화면</div><div>현재 숫자 : <span class="current" id="cur">-</span></div><div>방코드 : <span id="topRoom">-</span></div></div><div class="wrap grid2"><main><section class="card"><h2>방코드</h2><div class="roomCode" id="roomCode">-</div><p>학생 입장 QR</p><img id="qr" class="qr"><p id="joinUrl"></p><a id="displayLink" class="btn light" target="_blank">전자칠판 화면 열기</a></section><section class="card"><h2>학생 목록</h2><div id="students" class="student-list">아직 학생 없음</div></section><section class="card"><h2>선택한 학생</h2><div id="selected">학생 이름을 클릭하면 판을 크게 볼 수 있습니다.</div></section></main><aside><section class="card"><button class="btn green" id="newRoom">새 방 만들기</button> <button class="btn primary" id="next">다음 숫자 뽑기</button><br><br><button class="btn red" id="finish">종료/채점</button> <button class="btn light" id="reset">초기화</button></section><section class="card"><h2>순위</h2><div id="rank" class="rank"></div></section></aside></div><div id="modal" class="modal"><div class="modalbox"><button class="close" id="close">×</button><div class="navs"><button class="btn light" id="prevStu">◀ 이전</button><b id="modalName"></b><button class="btn light" id="nextStu">다음 ▶</button></div><div id="modalBoard" class="mini"></div></div></div><script src="app.js"></script><script>
let room='',state=null,selectedId='',studentsArr=[];const base=location.origin+location.pathname.replace('teacher.html','');
async function createRoom(){room=code();const deck=shuffle(makeDeck());state={room,deck,drawn:[],current:null,turn:0,status:'playing',createdAt:Date.now(),students:{}};await putRoom(room,state);localStorage.streamsTeacherRoom=room;renderRoom();}
function renderRoom(){id('roomCode').textContent=room||'-';id('topRoom').textContent=room||'-';const u=base+'student.html?room='+room;id('joinUrl').textContent=u;id('qr').src='https://api.qrserver.com/v1/create-qr-code/?size=210x210&data='+encodeURIComponent(u);id('displayLink').href=base+'display.html?room='+room;}
async function tick(){if(!room)return;state=await getRoom(room);if(!state)return;id('cur').textContent=state.current||'-';renderStudents();renderRank();}
function renderStudents(){let ss=state.students||{};studentsArr=Object.entries(ss);if(!studentsArr.length){id('students').textContent='아직 학생 없음';return}id('students').innerHTML='';studentsArr.forEach(([sid,s])=>{let b=document.createElement('button');b.textContent=`${s.name||'이름없음'}  ${s.done?'✅':'⌛'}  ${calc((s.board||[]).map(x=>x&&x.value)).score}점`;b.className=s.done?'done':'';b.onclick=()=>openStudent(sid);id('students').appendChild(b)});}
function renderRank(){let list=Object.values(state.students||{}).map(s=>({name:s.name,score:calc((s.board||[]).map(x=>x&&x.value)).score,best:calc((s.board||[]).map(x=>x&&x.value)).best})).sort((a,b)=>b.score-a.score);id('rank').innerHTML=list.map((x,i)=>`<div>${i+1}. ${x.name||''} - ${x.best}칸 / ${x.score}점</div>`).join('')||'순위 없음';}
function openStudent(sid){selectedId=sid;let s=state.students[sid];id('selected').textContent=`${s.name} 학생 판을 보고 있습니다.`;id('modalName').textContent=s.name;drawModal(s);id('modal').classList.add('show')}
function drawModal(s){let c=id('modalBoard');let b=createBoard(c);b.setName(s.name);let vals=(s.board||[]).map(x=>x&&x.value);let sc=calc(vals);b.setScore(sc.score);b.setValues(s.board||[])}
id('close').onclick=()=>id('modal').classList.remove('show');id('modal').onclick=e=>{if(e.target.id==='modal')id('modal').classList.remove('show')};document.addEventListener('keydown',e=>{if(e.key==='Escape')id('modal').classList.remove('show')});
id('prevStu').onclick=()=>{let i=studentsArr.findIndex(x=>x[0]===selectedId);if(i>0)openStudent(studentsArr[i-1][0])};id('nextStu').onclick=()=>{let i=studentsArr.findIndex(x=>x[0]===selectedId);if(i<studentsArr.length-1)openStudent(studentsArr[i+1][0])};
id('newRoom').onclick=createRoom;id('next').onclick=async()=>{if(!state)return;if((state.drawn||[]).length>=MAX_TURNS){alert('20개를 모두 뽑았습니다.');return}let deck=state.deck||[];let card=deck.shift();let drawn=[...(state.drawn||[]),card];await patchRoom(room,{deck,drawn,current:card,turn:drawn.length,status:'playing'});tick()};id('finish').onclick=async()=>{await patchRoom(room,{status:'finished'});tick()};id('reset').onclick=createRoom;
(async()=>{room=localStorage.streamsTeacherRoom||'';if(room){renderRoom();let r=await getRoom(room);if(!r)await createRoom()}else await createRoom();setInterval(tick,1000);tick()})();
</script></body></html>
